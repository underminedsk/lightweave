<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="760" viewBox="0 0 1250 760" role="img" aria-labelledby="title desc">
  <title id="title">ESP32 lantern schematic without INA228</title>
  <desc id="desc">A normal lantern node: 12 V battery feeds a 5 V buck converter; buck 5 V powers the ESP32 and SK6812 ring; ESP32 GPIO13 drives DIN through a 470 ohm resistor.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #202124; }
      .title { font-size: 30px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 15px; }
      .tiny { font-size: 13px; }
      .box { fill: #fff; stroke: #202124; stroke-width: 3; rx: 10; }
      .warn { fill: #fff7e6; stroke: #d9822b; stroke-width: 2; rx: 8; }
      .raw { stroke: #c92a2a; stroke-width: 5; fill: none; }
      .five { stroke: #e03131; stroke-width: 5; fill: none; }
      .gnd { stroke: #1c7ed6; stroke-width: 5; fill: none; }
      .data { stroke: #2f9e44; stroke-width: 4; fill: none; }
      .thin { stroke: #202124; stroke-width: 2; fill: none; }
      .node { fill: #202124; }
    </style>
  </defs>

  <rect width="1250" height="760" fill="#ffffff"/>
  <text x="48" y="56" class="title">Do Baskets Dream - normal lantern schematic</text>
  <text x="48" y="86" class="small">Most nodes use this version: no INA228 power monitor, no level shifter.</text>

  <rect x="55" y="215" width="150" height="135" class="box"/>
  <text x="88" y="260" class="label">12 V</text>
  <text x="78" y="286" class="label">Battery</text>
  <text x="214" y="245" class="small">+</text>
  <text x="214" y="324" class="small">-</text>

  <rect x="345" y="205" width="210" height="150" class="box"/>
  <text x="393" y="247" class="label">5 V Buck</text>
  <text x="365" y="287" class="small">IN+</text>
  <text x="365" y="326" class="small">IN-</text>
  <text x="487" y="287" class="small">OUT+</text>
  <text x="487" y="326" class="small">OUT-</text>

  <rect x="780" y="150" width="245" height="180" class="box"/>
  <text x="848" y="193" class="label">ESP32</text>
  <text x="800" y="235" class="small">VIN / 5V</text>
  <text x="800" y="272" class="small">GND</text>
  <text x="922" y="309" class="small">D13 / GPIO13</text>

  <rect x="780" y="535" width="245" height="130" class="box"/>
  <text x="830" y="577" class="label">SK6812 ring</text>
  <text x="804" y="615" class="small">5V</text>
  <text x="875" y="615" class="small">GND</text>
  <text x="950" y="615" class="small">DIN</text>

  <rect x="595" y="470" width="90" height="38" fill="#f8f1dc" stroke="#7a5a1c" stroke-width="2" rx="8"/>
  <text x="612" y="495" class="small">470 ohm</text>

  <line x1="715" y1="535" x2="715" y2="665" class="thin"/>
  <line x1="690" y1="535" x2="740" y2="535" class="thin"/>
  <line x1="690" y1="665" x2="740" y2="665" class="thin"/>
  <text x="650" y="595" class="small">1000 uF</text>
  <text x="678" y="552" class="tiny">+</text>
  <text x="674" y="661" class="tiny">stripe -</text>

  <path d="M205 245 H345" class="raw"/>
  <text x="240" y="229" class="tiny">RAW_12V</text>
  <path d="M205 324 H315 V405 H595 V326 H555" class="gnd"/>
  <path d="M595 405 H755 V272 H780" class="gnd"/>
  <path d="M755 610 H875" class="gnd"/>
  <path d="M755 665 H715" class="gnd"/>
  <text x="392" y="426" class="tiny">common GND</text>

  <path d="M555 287 H720 V235 H780" class="five"/>
  <path d="M720 287 V557 H780" class="five"/>
  <path d="M720 557 H715" class="five"/>
  <text x="580" y="270" class="tiny">+5V from buck</text>

  <path d="M1025 309 H1090 V450 H595" class="data"/>
  <path d="M685 489 H950 V615" class="data"/>
  <text x="875" y="452" class="tiny">LED_DATA</text>

  <circle cx="720" cy="287" r="5" class="node"/>
  <circle cx="755" cy="405" r="5" class="node"/>

  <rect x="55" y="690" width="670" height="45" class="warn"/>
  <text x="78" y="719" class="small">Raw 12 V only feeds the buck input. ESP32 and LEDs use buck 5 V.</text>
</svg>
