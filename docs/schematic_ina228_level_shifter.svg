<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="930" viewBox="0 0 1500 930" role="img" aria-labelledby="title desc">
  <title id="title">ESP32 lantern schematic with INA228 and optional 74AHCT125 level shifter</title>
  <desc id="desc">High-side INA228 current monitor feeds a buck converter; buck 5 V powers ESP32, SK6812 ring, and 74AHCT125; ESP32 GPIO13 enters A1 and Y1 drives DIN through a 470 ohm resistor.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #202124; }
      .title { font-size: 30px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 15px; }
      .tiny { font-size: 13px; }
      .box { fill: #fff; stroke: #202124; stroke-width: 3; rx: 10; }
      .optional { fill: #f8fbff; stroke: #1864ab; stroke-width: 3; rx: 10; }
      .warn { fill: #fff7e6; stroke: #d9822b; stroke-width: 2; rx: 8; }
      .raw { stroke: #c92a2a; stroke-width: 5; fill: none; }
      .load { stroke: #f08c00; stroke-width: 5; fill: none; }
      .five { stroke: #e03131; stroke-width: 5; fill: none; }
      .three { stroke: #8e44ad; stroke-width: 4; fill: none; }
      .gnd { stroke: #1c7ed6; stroke-width: 5; fill: none; }
      .data3 { stroke: #2b8a3e; stroke-width: 4; fill: none; stroke-dasharray: 8 6; }
      .data5 { stroke: #2f9e44; stroke-width: 5; fill: none; }
      .i2c { stroke: #7950f2; stroke-width: 3; fill: none; }
      .thin { stroke: #202124; stroke-width: 2; fill: none; }
      .node { fill: #202124; }
    </style>
  </defs>

  <rect width="1500" height="930" fill="#ffffff"/>
  <text x="48" y="56" class="title">Do Baskets Dream - lantern schematic with optional LED data level shifter</text>
  <text x="48" y="86" class="small">Use the 74AHCT125 path if the 3.3 V data signal is unreliable, wires are long, or the first pixel flickers.</text>

  <rect x="55" y="245" width="150" height="135" class="box"/>
  <text x="88" y="290" class="label">12 V</text>
  <text x="78" y="316" class="label">Battery</text>
  <text x="214" y="275" class="small">+</text>
  <text x="214" y="354" class="small">-</text>

  <rect x="330" y="190" width="230" height="210" class="box"/>
  <text x="398" y="232" class="label">INA228</text>
  <text x="352" y="267" class="small">VIN+</text>
  <text x="352" y="344" class="small">VIN-</text>
  <text x="498" y="267" class="small">VBUS</text>
  <text x="505" y="306" class="small">VCC</text>
  <text x="505" y="344" class="small">GND</text>
  <text x="505" y="382" class="small">SDA/SCL</text>

  <rect x="670" y="225" width="210" height="150" class="box"/>
  <text x="718" y="267" class="label">5 V Buck</text>
  <text x="690" y="307" class="small">IN+</text>
  <text x="690" y="346" class="small">IN-</text>
  <text x="812" y="307" class="small">OUT+</text>
  <text x="812" y="346" class="small">OUT-</text>

  <rect x="1020" y="160" width="245" height="255" class="box"/>
  <text x="1088" y="203" class="label">ESP32</text>
  <text x="1040" y="245" class="small">VIN / 5V</text>
  <text x="1040" y="282" class="small">3V3</text>
  <text x="1040" y="319" class="small">GND</text>
  <text x="1040" y="356" class="small">GPIO21 SDA</text>
  <text x="1040" y="393" class="small">GPIO22 SCL</text>
  <text x="1162" y="393" class="small">D13 / GPIO13</text>

  <rect x="715" y="555" width="250" height="155" class="optional"/>
  <text x="760" y="593" class="label">74AHCT125</text>
  <text x="735" y="628" class="small">A1 input</text>
  <text x="735" y="666" class="small">OE to GND</text>
  <text x="862" y="628" class="small">Y1 output</text>
  <text x="862" y="666" class="small">VCC = 5V</text>
  <text x="862" y="694" class="small">GND</text>

  <rect x="1110" y="575" width="90" height="38" fill="#f8f1dc" stroke="#7a5a1c" stroke-width="2" rx="8"/>
  <text x="1127" y="600" class="small">470 ohm</text>

  <rect x="1115" y="725" width="245" height="130" class="box"/>
  <text x="1165" y="767" class="label">SK6812 ring</text>
  <text x="1139" y="805" class="small">5V</text>
  <text x="1210" y="805" class="small">GND</text>
  <text x="1285" y="805" class="small">DIN</text>

  <line x1="1048" y1="730" x2="1048" y2="855" class="thin"/>
  <line x1="1023" y1="730" x2="1073" y2="730" class="thin"/>
  <line x1="1023" y1="855" x2="1073" y2="855" class="thin"/>
  <text x="984" y="790" class="small">1000 uF</text>
  <text x="1012" y="747" class="tiny">+</text>
  <text x="1008" y="851" class="tiny">stripe -</text>

  <path d="M205 275 H255" class="raw"/>
  <path d="M295 275 H330" class="raw"/>
  <line x1="255" y1="275" x2="275" y2="275" class="thin"/>
  <line x1="295" y1="275" x2="276" y2="262" class="thin"/>
  <text x="248" y="244" class="small">Master</text>
  <text x="251" y="263" class="small">ON/OFF</text>
  <text x="232" y="259" class="tiny">RAW_12V</text>
  <path d="M560 344 H670" class="load"/>
  <text x="575" y="327" class="tiny">LOAD_12V_TO_BUCK</text>
  <path d="M560 267 V246 H370 V267" class="raw"/>
  <text x="405" y="242" class="tiny">VBUS tied to VIN+</text>

  <path d="M880 307 H970 V245 H1020" class="five"/>
  <path d="M970 307 V575 H965" class="five"/>
  <path d="M970 575 V747 H1115" class="five"/>
  <path d="M1048 730 H970" class="five"/>
  <text x="902" y="290" class="tiny">+5V from buck</text>

  <path d="M205 354 H300 V480 H640 V346 H670" class="gnd"/>
  <path d="M640 480 H995 V346 H880" class="gnd"/>
  <path d="M995 346 H1020" class="gnd"/>
  <path d="M995 694 H965" class="gnd"/>
  <path d="M995 666 H715" class="gnd"/>
  <path d="M995 800 H1210" class="gnd"/>
  <path d="M995 855 H1048" class="gnd"/>
  <path d="M560 344 H590 V480" class="gnd"/>
  <text x="450" y="501" class="tiny">common GND</text>

  <path d="M1020 282 H590 V306 H560" class="three"/>
  <text x="660" y="293" class="tiny">INA228 logic VCC = ESP32 3V3</text>

  <path d="M1020 356 H610 V370 H560" class="i2c"/>
  <path d="M1020 393 H600 V390 H560" class="i2c"/>
  <text x="650" y="365" class="tiny">I2C SDA/SCL</text>

  <path d="M1265 393 H1318 V628 H715" class="data3"/>
  <text x="1045" y="627" class="tiny">LED_DATA_3V3</text>
  <path d="M965 628 H1110" class="data5"/>
  <path d="M1200 594 H1285 V805" class="data5"/>
  <text x="1198" y="648" class="tiny">LED_DATA_5V</text>

  <circle cx="330" cy="275" r="5" class="node"/>
  <circle cx="560" cy="344" r="5" class="node"/>
  <circle cx="970" cy="307" r="5" class="node"/>
  <circle cx="995" cy="480" r="5" class="node"/>
  <circle cx="970" cy="575" r="5" class="node"/>

  <rect x="55" y="805" width="890" height="75" class="warn"/>
  <text x="78" y="835" class="label">Warning</text>
  <text x="78" y="860" class="small">Raw 12 V only feeds INA228 VIN+ and buck input. ESP32 and LEDs get buck 5 V; INA228 logic VCC gets ESP32 3V3.</text>
</svg>
