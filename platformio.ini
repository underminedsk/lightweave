; Do Baskets Dream — node firmware
; Two board environments share the same source. Role (conductor/performer) is a
; build flag so a node can be reflashed for either role without code changes.
;
;   pio run -e devkitc-performer -t upload      ; a performer on a DevKitC
;   pio run -e devkitc-conductor -t upload      ; the conductor on a DevKitC
;   pio run -e firebeetle-performer -t upload   ; a performer on a FireBeetle 2
;
; Watch sync diagnostics with:  pio device monitor

[platformio]
default_envs = devkitc-performer

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    makuna/NeoPixelBus @ ^2.8.0
build_flags =
    -std=gnu++17
build_unflags =
    -std=gnu++11

; ---- Boards --------------------------------------------------------------

[devkitc]
board = esp32dev

[firebeetle]
board = dfrobot_firebeetle2_esp32e

; ---- Roles ---------------------------------------------------------------
; NODE_ROLE: 0 = performer, 1 = conductor

[role-performer]
build_flags = -D NODE_ROLE=0

[role-conductor]
build_flags = -D NODE_ROLE=1

; ---- Environments (board x role) -----------------------------------------

[env:devkitc-performer]
board = ${devkitc.board}
build_flags = ${env.build_flags} ${role-performer.build_flags}

[env:devkitc-conductor]
board = ${devkitc.board}
build_flags = ${env.build_flags} ${role-conductor.build_flags}

[env:firebeetle-performer]
board = ${firebeetle.board}
build_flags = ${env.build_flags} ${role-performer.build_flags}

[env:firebeetle-conductor]
board = ${firebeetle.board}
build_flags = ${env.build_flags} ${role-conductor.build_flags}
