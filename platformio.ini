; Do Baskets Dream — node firmware
; One firmware image for every node. Role (conductor/performer) is a runtime NVS
; value set over serial (`role conductor|performer`), not a build flag — so you
; flash the same image everywhere, then provision role/id/pos per board.
;
;   pio run -e devkitc -t upload          ; build + flash a DevKitC
;   pio run -e firebeetle -t upload       ; build + flash a FireBeetle 2
;   pio device monitor                    ; provision + watch diagnostics
;   pio test -e native                    ; host unit tests

[platformio]
default_envs = devkitc

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    makuna/NeoPixelBus @ ^2.8.0
    adafruit/Adafruit INA228 Library @ ^3.0.0
build_flags =
    -std=gnu++17
build_unflags =
    -std=gnu++11

[env:devkitc]
board = esp32dev

[env:firebeetle]
board = dfrobot_firebeetle2_esp32e

; ---- Host unit tests -----------------------------------------------------
; Tests the dependency-free sync core + pattern math on the host (no hardware):
;   pio test -e native
[env:native]
platform = native
framework =
lib_deps =
test_framework = unity
build_flags = -std=gnu++17 -I include
